server:
  port: 8080
spring:
  application:
    name: Loan-Payment-System
  datasource:
    driverClassName: org.h2.Driver
    password: ''
    url: jdbc:h2:mem:loandb
    username: sa
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
